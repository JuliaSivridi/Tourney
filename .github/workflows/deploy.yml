name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: stler
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/stler/tg-tourney
            git pull
            docker compose up -d --build
